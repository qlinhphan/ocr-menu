services:
  mysql:
    image: mysql:8.0.36
    container_name: dvx-ocr-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --bind-address=0.0.0.0
    environment:
      MYSQL_DATABASE: vin
      MYSQL_USER: vin
      MYSQL_PASSWORD: vin
      MYSQL_ROOT_PASSWORD: vin
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pvin"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
